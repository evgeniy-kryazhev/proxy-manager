services:
  proxy-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxy-manager-web
    ports:
      - "8088:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__Provider: Sqlite
      ConnectionStrings__DefaultConnection: Data Source=/app/data/proxy-manager.db
      AdminUser__Username: admin
      AdminUser__Password: ChangeMe_12345!
      Hysteria__ConfigPath: /opt/hysteria/config.yaml
      Hysteria__ComposeFilePath: /opt/hysteria/docker-compose.yml
      Hysteria__WorkingDirectory: /opt/hysteria
      Hysteria__Host: excraft.ru
      Hysteria__Port: 443
      Hysteria__Sni: excraft.ru
    volumes:
      - proxy-manager-data:/app/data
      - /opt/hysteria:/opt/hysteria
    restart: unless-stopped

volumes:
  proxy-manager-data:
